<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人音樂盒 PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 頂部主容器 -->
    <div class="main-container">
        
        <!-- ================= 1. 聽歌分頁 ================= -->
        <div id="listen-tab" class="tab-content active">
            <!-- 聽歌首頁子選單 -->
            <div id="listen-menu" class="sub-menu">
                <button class="menu-btn" onclick="showSongList('all')">🌐 所有歌曲</button>
                <button class="menu-btn" onclick="showPlaylistList()">🗂️ 分類歌單</button>
            </div>

            <!-- 分類歌單選取區 -->
            <div id="playlist-selector-view" class="list-view hidden">
                <button class="back-btn" onclick="backToListenMenu()">⬅️ 返回主選單</button>
                <h3>選擇歌單</h3>
                <div id="playlist-names-container"></div>
            </div>

            <!-- 歌曲清單顯示區 -->
            <div id="song-list-view" class="list-view hidden">
                <button class="back-btn" onclick="backToListenMenu()">⬅️ 返回主選單</button>
                <h3 id="list-title">歌曲列表</h3>
                <div id="songs-container"></div>
            </div>

            <!-- 核心播放器面板 -->
            <div id="player-view" class="player-container hidden">
                <button class="back-btn" onclick="backToSongList()">⬅️ 返回歌曲清單</button>
                <h2 id="title">歌曲載入中...</h2>
                <p id="artist">歌手名稱</p>
                <audio id="audio"></audio>
                <div class="progress-container" id="progress-container">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="controls">
                    <button id="prev">⏮ 上一首</button>
                    <button id="play">▶ 播放</button>
                    <button id="next">⏭ 下一首</button>
                    <button id="shuffle-btn">🔀 隨機：關</button>
                </div>
            </div>
        </div>

        <!-- ================= 2. 新增歌曲分頁 (電腦端專用) ================= -->
        <div id="add-tab" class="tab-content">
            <div class="card">
                <h3>📥 從 YouTube 下載新歌曲</h3>
                <div id="local-add-form" class="form-group">
                    <input type="text" id="yt-url" placeholder="請貼上 YouTube 網址">
                    <input type="text" id="song-title" placeholder="歌曲名稱 (例如: 青花瓷)">
                    <input type="text" id="song-artist" placeholder="歌手名稱 (例如: 周杰倫)">
                    <input type="text" id="song-filename" placeholder="英文副檔名 (例如: qingtian)">
                    <button class="action-btn" onclick="downloadYouTubeSong()">開始單首下載轉檔</button>
                    
                    <hr style="border: 1px solid #333; margin: 25px 0;">
                    
                    <h3>⚡ 批次下載 (貼上手機複製的備忘錄)</h3>
                    <textarea id="batch-input" placeholder="請在此貼上從手機複製的一整串備忘錄資料..." style="width: 100%; height: 100px; background: #282828; color: white; border: 1px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; font-family: sans-serif; resize: none; margin-bottom: 10px;"></textarea>
                    <button class="action-btn" onclick="batchDownloadSongs()" style="background-color: #ff9800;">開始批次下載所有歌曲</button>
                    
                    <p id="add-status" class="status-msg"></p>
                </div>
                <div id="github-add-msg" class="hidden-msg hidden">
                    <p>💡 提示：手機網頁版不支援直接下載歌曲。請先使用「📝 備忘錄」功能存起網址，等用電腦打開後台時再一起批次下載！</p>
                </div>
            </div>
        </div>

        <!-- ================= 3. 建立歌單分頁 ================= -->
        <div id="playlist-tab" class="tab-content">
            <div class="card">
                <h3>📂 建立新分類歌單</h3>
                <div id="local-playlist-form">
                    <input type="text" id="new-playlist-name" placeholder="歌單名稱 (例如: 抖音歌、休閒聽)">
                    <h4>勾選要歸類進去的歌曲：</h4>
                    <div id="playlist-songs-checkboxes"></div>
                    <button class="action-btn" onclick="createPlaylist()">確認儲存歌單</button>
                    <p id="playlist-status" class="status-msg"></p>
                </div>
                <div id="github-playlist-msg" class="hidden-msg hidden">
                    <p>💡 提示：手機網頁版不支援修改歌單。請在電腦上執行 <code>python app.py</code> 來進行歌單分類與儲存！</p>
                </div>
            </div>
        </div>

        <!-- ================= 4. 📝 備忘錄分頁 (手機、電腦通用) ================= -->
        <div id="memo-tab" class="tab-content">
            <div class="card">
                <h3>📝 待下載歌曲備忘錄</h3>
                <p style="font-size: 13px; color: #aaa; line-height: 1.4; margin-bottom: 15px;">
                    在手機上滑到想聽的歌？先存進這裡。等回到電腦前，點擊下方「複製全部」，傳到電腦貼上就能一鍵批次下載！
                </p>
                <input type="text" id="memo-url" placeholder="請貼上 YouTube 網址">
                <input type="text" id="memo-title" placeholder="歌曲名稱">
                <input type="text" id="memo-artist" placeholder="歌手名稱">
                <input type="text" id="memo-filename" placeholder="英文副檔名 (例如: zuijin)">
                <button class="action-btn" onclick="addToMemo()" style="background-color: #ff9800; border: none; margin-top: 5px;">💾 存入備忘錄</button>
                
                <hr style="border: 1px solid #333; margin: 25px 0;">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h4 style="margin: 0;">📋 待下載清單</h4>
                    <button onclick="copyMemoData()" style="background: #1db954; border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">一鍵複製資料</button>
                </div>
                <div id="memo-list-container"></div>
            </div>
        </div>

    </div>

    <!-- 底部固定導覽列 -->
    <nav class="navbar">
        <button class="nav-btn active" onclick="switchTab('listen-tab', this)">🎵 聽歌</button>
        <button class="nav-btn" onclick="switchTab('add-tab', this)">📥 新增</button>
        <button class="nav-btn" onclick="switchTab('playlist-tab', this)">📂 歌單</button>
        <button class="nav-btn" onclick="switchTab('memo-tab', this)">📝 備忘錄</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
